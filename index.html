<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porra Mensual</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&family=Poppins:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <div class="top-bar">
                <div class="logo-section">
                    <span class="logo-icon">⚽</span>
                    <h1 class="logo-text">Porra <span>Mensual</span></h1>
                </div>
                <nav class="nav-buttons">
                    <button class="btn-nav active" data-target="home">Inicio</button>
                    <button class="btn-nav" data-target="betting">Apuestas</button>
                    <button class="btn-nav" data-target="ranking">Ranking</button>
                    <button class="btn-nav" data-target="status">Estado</button>
                    <button class="btn-nav" data-target="admin">Admin</button>
                </nav>
            </div>
            <div id="status-bar" class="status-bar">
                <span id="status-message">Cargando...</span>
            </div>
        </div>
    </header>

    <main id="app-container" class="container">
        <!-- Dynamic views will be injected here -->
    </main>

    <!-- Global Modals / Toasts Container -->
    <div id="toast-container" class="toast-container"></div>

    <template id="loading-template">
        <div class="card" style="text-align: center; padding: 3rem;">
            <div style="font-size: 2rem; animation: pulse 1.5s infinite;">⏳</div>
            <h3 style="margin-top: 1rem;">Cargando datos...</h3>
        </div>
    </template>

    <template id="error-template">
        <div class="card" style="text-align: center; padding: 3rem; border-color: var(--accent-danger);">
            <div style="font-size: 2rem; color: var(--accent-danger);">⚠️</div>
            <h3 style="margin-top: 1rem; color: var(--accent-danger);">Error</h3>
            <p class="error-msg" style="margin-top: 0.5rem;"></p>
        </div>
    </template>

    <script type="module" src="src/app.js"></script>
</body>
</html>
